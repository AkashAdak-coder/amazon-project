<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="css/amazon.css">
</head>
<body>
    <header>
        <div class="amazon-logo-mobile">
            <img src="images/amazon-mobile-logo-white.png" alt="amazon-image">
        </div>

        <div class="amazon-logo">
            <img src="images/amazon-logo-white.png" alt="amazon-image">
        </div>

        <div class="search-bar">
            <input type="text" placeholder="Search Product">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>

        <div class="order-section">
            <p>Returns <br>
            <span>& Orders</span></p>
        </div>

        <div class="cart-section">
            <img src="images/icons/cart-icon.png" alt="">
            <div class="cart-items">3</div>
            <div class="cart-name">Cart</div>
        </div>
    </header>

    <main class="main-js">
        <div class="cards">
        </div>
    </main>

    <script src="script/amazon.js" type="module"></script>
</body>
</html>
