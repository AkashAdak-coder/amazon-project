<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="css/checkout.css">
</head>
<body>
    <header>
        <div class="mobile-logo">
            <a href="index.html">
                <img src="images/amazon-mobile-logo.png" alt="">
            </a>
        </div>

        <div class="logo">
            <a href="index.html">
                <img src="images/amazon-logo.png" alt="">
            </a>
        </div>

        <div class="checkout-title">
            <div>Checkout ( <span>3 items</span> )</div>
        </div>

        <div class="lock-icon">
            <img src="images/icons/checkout-lock-icon.png" alt="">
        </div>
    </header>


    <main>
        <div>Review your order</div>
        <div class="checkout-section">
            <div class="cart-items"></div>

            <div class="payment-summary">

                <div class="payment-summary-title">Order Summary</div>

                <div class="items">
                    <div>Items (3):</div>
                    <div>$42.75</div>
                </div>
                
                <div class="items">
                    <div>Shipping & handling:</div>
                    <div>$4.99</div>
                </div>

                <div class="items">
                    <div>Total before tax:</div>
                    <div>$47.74</div>
                </div>

                <div class="items last-item">
                    <div>Estimated tax (10%):</div>
                    <div>$4.77</div>
                </div>

                <div class="payment-summary-total-order">
                    <div>Order total:</div>
                    <div>$52.51</div>
                </div>

                <div class="order-button">
                    <button>Place your order</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script/checkout.js" type="module"></script>
</body>
</html>
